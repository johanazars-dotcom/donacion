<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesion | Banco de Sangre</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #d9534f;
            --secondary: #2c3e50;
            --bg: #f8f9fa;
            --white: #ffffff;
        }
        body { font-family: 'Inter', sans-serif; margin: 0; background-color: var(--bg); color: var(--secondary); display: flex; justify-content: center; align-items: center; height: 100vh; }
        .container { background: var(--white); padding: 40px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); width: 100%; max-width: 350px; }
        h1 { border-left: 5px solid var(--primary); padding-left: 15px; margin-top: 0; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .btn-action { background-color: var(--primary); color: white; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: 700; width: 100%; }
        .btn-action:hover { background-color: #c9302c; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Acceso Admin</h1>
        <form id="form-login">
            <input type="email" id="email" placeholder="Correo electronico" required>
            <input type="password" id="password" placeholder="Contrasena" required>
            <button type="submit" class="btn-action">Ingresar</button>
        </form>
    </div>
    <script src="app.js?v=3"></script>
</body>
</html>
