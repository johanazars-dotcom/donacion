<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestion de Donaciones | Banco de Sangre</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #d9534f;
            --secondary: #2c3e50;
            --bg: #f8f9fa;
            --white: #ffffff;
            --success: #27ae60;
        }

        body { font-family: 'Inter', sans-serif; margin: 0; background-color: var(--bg); color: var(--secondary); }
        
        .navbar { background-color: var(--secondary); padding: 1rem 2rem; display: flex; gap: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .navbar a { color: var(--white); text-decoration: none; font-weight: 600; transition: opacity 0.3s; }
        .navbar a:hover { opacity: 0.8; }

        .container { max-width: 1000px; margin: 30px auto; background: var(--white); padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        
        h1 { margin-top: 0; border-left: 5px solid var(--primary); padding-left: 15px; color: var(--secondary); }

        .form-card { background: #fffcfc; border: 1px solid #eee; padding: 20px; border-radius: 8px; margin-bottom: 30px; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; }
        
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        
        .btn-action { background-color: var(--success); color: white; padding: 12px 25px; border: none; border-radius: 6px; cursor: pointer; font-weight: 700; transition: transform 0.2s, background 0.3s; margin-top: 15px; }
        .btn-action:hover { background-color: #219150; transform: translateY(-2px); }

        table { width: 100%; border-collapse: separate; border-spacing: 0; margin-top: 20px; }
        th { background-color: var(--secondary); color: white; padding: 15px; text-align: left; }
        th:first-child { border-top-left-radius: 8px; }
        th:last-child { border-top-right-radius: 8px; }
        td { padding: 15px; border-bottom: 1px solid #eee; }
        tr:hover { background-color: #f1f1f1; }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="index.html">Donantes</a>
        <a href="donaciones.html">Donaciones</a>
        <a href="inventario.html">Inventario</a>
    </nav>

    <div class="container">
        <h1>Registrar Nueva Donación</h1>
        
        <div class="form-card">
            <form id="form-donacion">
                <div class="form-grid">
                    <select id="idDonanteDonacion" required>
                        <option value="">Seleccione un donante...</option>
                    </select>
                    <input type="number" id="cantidadMl" placeholder="Cantidad Extraida (ml)" required>
                    <input type="text" id="observaciones" placeholder="Observaciones adicionales">
                </div>
                <button type="submit" class="btn-action">Registrar en Sistema</button>
            </form>
        </div>

        <h2>Historial de Donaciones</h2>
        <table id="tabla-donaciones">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Donante</th>
                    <th>Código</th>
                    <th>ml</th>
                    <th>Observaciones</th>
                    <th>Fecha</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </div>

  <script type="module" src="app.js?v=2"></script>
</body>
</html>
