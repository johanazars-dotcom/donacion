<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestion de Donantes | Banco de Sangre</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #d9534f;
            --secondary: #2c3e50;
            --bg: #f8f9fa;
            --white: #ffffff;
            --blue: #3498db;
        }

        body { font-family: 'Inter', sans-serif; margin: 0; background-color: var(--bg); color: var(--secondary); }
        
        .navbar { background-color: var(--secondary); padding: 1rem 2rem; display: flex; gap: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .navbar a { color: var(--white); text-decoration: none; font-weight: 600; }

        .container { max-width: 1000px; margin: 30px auto; background: var(--white); padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        
        h1 { border-left: 5px solid var(--primary); padding-left: 15px; margin: 0; }

        .header-section { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }

        .form-card { background: #fffcfc; border: 1px solid #eee; padding: 25px; border-radius: 8px; margin-bottom: 30px; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        
        .btn-action { background-color: var(--primary); color: white; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: 700; width: 100%; margin-top: 15px; }
        .btn-action:hover { background-color: #c9302c; }

        .btn-export { width: auto; margin-top: 0; background-color: var(--secondary); }
        .btn-export:hover { background-color: #1a252f; }

        table { width: 100%; border-collapse: separate; border-spacing: 0; margin-top: 20px; }
        th { background-color: var(--secondary); color: white; padding: 15px; text-align: left; }
        td { padding: 15px; border-bottom: 1px solid #eee; }
        
        .btn-edit { background-color: var(--blue); color: white; padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; }
        .btn-delete { background-color: var(--primary); color: white; padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; }
        
        .checkbox-group { display: flex; align-items: center; gap: 10px; padding: 10px; border: 1px solid #ddd; border-radius: 6px; background: #fff; }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="index.html">Donantes</a>
        <a href="donaciones.html">Donaciones</a>
        <a href="inventario.html">Inventario</a>
    </nav>

    <div class="container">
        <div class="header-section">
            <h1>Gestion de Donantes</h1>
            <button onclick="window.exportarPdf()" class="btn-action btn-export">Exportar Reporte PDF</button>
        </div>
        
        <div class="form-card">
            <form id="form-donante">
                <input type="hidden" id="donanteId">
                <div class="form-grid">
                    <input type="text" id="nombres" placeholder="Nombres" required>
                    <input type="text" id="apellidos" placeholder="Apellidos" required>
                    <input type="text" id="documento" placeholder="Documento" required>
                    <input type="date" id="fechaNacimiento" required>
                    <select id="tipoSangre" required>
                        <option value="">Seleccione tipo de sangre</option>
                        <option value="A+">A+</option> <option value="A-">A-</option>
                        <option value="O+">O+</option> <option value="O-">O-</option>
                        <option value="B+">B+</option> <option value="B-">B-</option>
                        <option value="AB+">AB+</option> <option value="AB-">AB-</option>
                    </select>
                    <input type="number" id="peso" placeholder="Peso (kg)" required>
                    <input type="text" id="telefono" placeholder="Telefono" required>
                    <input type="email" id="correo" placeholder="Correo" required>
                    <input type="text" id="direccion" placeholder="Direccion" required>
                    <input type="file" id="firmaDocumento" accept="image/*">
                    <div class="checkbox-group">
                        <input type="checkbox" id="aceptaConsentimiento">
                        <label for="aceptaConsentimiento">Acepta terminos y condiciones</label>
                    </div>
                </div>
                <button type="submit" id="btn-submit" class="btn-action">Registrar Donante</button>
            </form>
        </div>

        <table id="tabla-donantes">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Documento</th>
                    <th>Nombre Completo</th>
                    <th>Sangre</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
            </tbody>
        </table>
    </div>

    <script src="app.js?v=3"></script>
</body>
</html>
